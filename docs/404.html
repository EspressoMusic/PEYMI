<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="utf-8" />
  <title>Bizmi</title>
  <script>
    (function () {
      var path = location.pathname;
      var search = location.search || "";
      var hash = location.hash || "";
      sessionStorage.setItem("peymii_path", path + search + hash);
      var slash = path.lastIndexOf("/");
      var base = slash >= 0 ? path.substring(0, slash + 1) : "/";
      location.replace(base + "index.html" + search + hash);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=index.html" />
    <p><a href="index.html">Open Bizmi</a></p>
  </noscript>
</head>
<body></body>
</html>
